<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodSense AI - Smart Nutrition Analysis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #10b981;
            --light-green: #34d399;
            --dark-gray: #111827;
            --light-gray: #6b7280;
            --bg-light: #f9fafb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --border-color: #e5e7eb;
            --shadow: rgba(0,0,0,0.1);
        }
        
        [data-theme="dark"] {
            --primary-green: #10b981;
            --light-green: #34d399;
            --dark-gray: #f9fafb;
            --light-gray: #9ca3af;
            --bg-light: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --border-color: #374151;
            --shadow: rgba(0,0,0,0.3);
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--bg-primary);
            box-shadow: 0 2px 10px var(--shadow);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary-green);
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        
        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            margin: 0;
            padding: 0;
        }
        
        .nav-links a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .nav-links a.active {
            color: var(--primary-green);
            border-bottom: 2px solid var(--primary-green);
            padding-bottom: 0.25rem;
        }
        
        .nav-links a:hover {
            color: var(--primary-green);
        }
        
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-primary);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .theme-toggle:hover {
            background: var(--bg-secondary);
        }
        
        .btn-login {
            background: none;
            border: none;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .btn-login:hover {
            background: var(--bg-secondary);
        }
        
        .btn-primary {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s ease;
        }
        
        .btn-primary:hover {
            background: #059669;
        }
        
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            align-items: center;
        }
        
        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 0 0 1.5rem 0;
        }
        
        .highlight {
            color: var(--primary-green);
        }
        
        .hero-content p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin: 0 0 2rem 0;
            line-height: 1.6;
        }
        
        .hero-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
        }
        
        .btn-secondary {
            background: none;
            color: var(--primary-green);
            border: 2px solid var(--primary-green);
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: var(--primary-green);
            color: white;
        }
        
        .stats {
            display: flex;
            gap: 2rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-number {
            display: block;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-green);
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .hero-mockup {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .phone-mockup {
            width: 300px;
            height: 600px;
            background: var(--bg-primary);
            border-radius: 2rem;
            box-shadow: 0 20px 40px var(--shadow);
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .phone-screen {
            padding: 2rem 1.5rem;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-light));
            transition: background 0.3s ease;
        }
        
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .app-title {
            font-weight: 700;
            color: var(--primary-green);
        }
        
        .app-icon {
            width: 30px;
            height: 30px;
            background: var(--primary-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .food-analysis {
            background: #f59e0b;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            color: white;
            text-align: center;
        }
        
        .food-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f59e0b;
            font-size: 1.5rem;
        }
        
        .nutrition-bars {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .nutrition-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .bar {
            height: 8px;
            border-radius: 4px;
            flex: 1;
        }
        
        .bar-protein { background: #3b82f6; width: 80%; }
        .bar-carbs { background: #f59e0b; width: 60%; }
        .bar-fiber { background: #10b981; width: 40%; }
        .bar-fat { background: #ef4444; width: 30%; }
        
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }
        
        .floating-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
        }
        
        .circle-1 {
            width: 80px;
            height: 80px;
            background: #dbeafe;
            top: 10%;
            left: -10%;
            animation: float 6s ease-in-out infinite;
        }
        
        .circle-2 {
            width: 60px;
            height: 60px;
            background: #dcfce7;
            top: 60%;
            right: -5%;
            animation: float 8s ease-in-out infinite reverse;
        }
        
        .circle-3 {
            width: 40px;
            height: 40px;
            background: #fef3c7;
            bottom: 20%;
            left: 10%;
            animation: float 7s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .dashed-lines {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }
        
        .dashed-line {
            position: absolute;
            border: 2px dashed rgba(16, 185, 129, 0.3);
            border-radius: 50%;
        }
        
        .line-1 {
            width: 200px;
            height: 200px;
            top: 20%;
            left: -20%;
        }
        
        .line-2 {
            width: 150px;
            height: 150px;
            bottom: 30%;
            right: -15%;
        }
        
        /* Modal Styles */
        .modal {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: var(--bg-primary);
            padding: 2rem;
            border-radius: 1rem;
            max-width: 500px;
            width: 90%;
            position: relative;
            box-shadow: 0 20px 40px var(--shadow);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.3s ease;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: color 0.3s ease;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.3s ease, background-color 0.3s ease, color 0.3s ease;
            background: var(--bg-primary);
            color: var(--text-primary);
            box-sizing: border-box;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-green);
        }
        
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.3s ease, background-color 0.3s ease, color 0.3s ease;
            background: var(--bg-primary);
            color: var(--text-primary);
            box-sizing: border-box;
        }
        
        .form-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        
        .form-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }
        
        /* New Sections Styles */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .section-header h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .section-header p {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }
        
        /* Features Section */
        .features-section {
            padding: 6rem 0;
            background: var(--bg-secondary);
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }
        
        .feature-card {
            background: var(--bg-primary);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 20px var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px var(--shadow);
        }
        
        .feature-icon {
            width: 60px;
            height: 60px;
            background: var(--primary-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .feature-card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .feature-card p {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        /* How It Works Section */
        .how-it-works {
            padding: 6rem 0;
            background: var(--bg-primary);
        }
        
        .steps-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 3rem;
        }
        
        .step {
            text-align: center;
        }
        
        .step-number {
            width: 80px;
            height: 80px;
            background: var(--primary-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin: 0 auto 2rem;
        }
        
        .step-content h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .step-content p {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        /* Audience Section */
        .audience-section {
            padding: 6rem 0;
            background: var(--bg-secondary);
        }
        
        .audience-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        
        .audience-card {
            background: var(--bg-primary);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 20px var(--shadow);
            text-align: center;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }
        
        .audience-card:hover {
            transform: translateY(-5px);
        }
        
        .audience-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-green), var(--light-green));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
        }
        
        .audience-card h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        
        .audience-card p {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        /* Dashboard Preview */
        .dashboard-preview {
            padding: 6rem 0;
            background: var(--bg-primary);
        }
        
        .dashboard-demo {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }
        
        .demo-card {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 1rem;
            border: 2px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }
        
        .demo-card h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }
        
        .score-display {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--bg-primary);
            border-radius: 0.5rem;
            transition: background-color 0.3s ease;
        }
        
        .score-label {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .score-value {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 600;
        }
        
        .score-value.good {
            background: #dcfce7;
            color: #166534;
        }
        
        .score-value.medium {
            background: #fef3c7;
            color: #92400e;
        }
        
        .recommendations {
            list-style: none;
            padding: 0;
        }
        
        .recommendations li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: var(--bg-primary);
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: background-color 0.3s ease;
        }
        
        .recommendations i {
            color: var(--primary-green);
        }
        
        /* Call to Action Section */
        .cta-section {
            background: var(--primary-green);
            padding: 4rem 0;
            text-align: center;
        }
        
        .cta-content h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1rem;
        }
        
        .cta-content p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .btn-cta {
            background: white;
            color: var(--primary-green);
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .btn-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }
        
        /* Footer Section */
        .footer {
            background: #1f2937;
            padding: 3rem 0 2rem;
            color: #9ca3af;
        }
        
        .footer-content {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }
        
        .footer-brand {
            max-width: 300px;
        }
        
        .footer-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .footer-logo .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }
        
        .footer-logo span {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }
        
        .footer-tagline {
            color: #9ca3af;
            line-height: 1.6;
            margin: 0;
        }
        
        .footer-columns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }
        
        .footer-column h3 {
            color: white;
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        
        .footer-column ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .footer-column li {
            margin-bottom: 0.5rem;
        }
        
        .footer-column a {
            color: #9ca3af;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer-column a:hover {
            color: var(--primary-green);
        }
        
        /* Dark mode footer adjustments */
        [data-theme="dark"] .footer {
            background: #111827;
        }
        
        [data-theme="dark"] .footer-logo span {
            color: var(--text-primary);
        }
        
        [data-theme="dark"] .footer-column h3 {
            color: var(--text-primary);
        }
        
        [data-theme="dark"] .footer-tagline,
        [data-theme="dark"] .footer-column a {
            color: var(--text-secondary);
        }
        
        [data-theme="dark"] .footer-column a:hover {
            color: var(--primary-green);
        }
        
        /* Responsive Styles */
        @media (max-width: 768px) {
            .hero {
                grid-template-columns: 1fr;
                text-align: center;
                padding: 2rem 1rem;
            }
            
            .hero-content h1 {
                font-size: 2.5rem;
            }
            
            .stats {
                justify-content: center;
            }
            
            .phone-mockup {
                width: 250px;
                height: 500px;
            }
            
            .modal-content {
                margin: 1rem;
                padding: 1.5rem;
            }
            
            .cta-content h2 {
                font-size: 2rem;
            }
            
            .cta-content p {
                font-size: 1rem;
            }
            
            .footer-content {
                grid-template-columns: 1fr;
                gap: 2rem;
                text-align: center;
            }
            
            .footer-columns {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }
            
            .footer-brand {
                max-width: none;
            }
        }
        
        @media (max-width: 480px) {
            .footer-columns {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .cta-content h2 {
                font-size: 1.8rem;
            }
        }
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-leaf"></i>
                </div>
                <span>FoodSense AI</span>
            </div>
            <ul class="nav-links">
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#features">Features</a></li>
                <li><a href="#how-it-works">How It Works</a></li>
                <li><a href="#learn">Learn</a></li>
                <li><a href="#dashboard">Dashboard</a></li>
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="btn-login">Log In</button>
                <a href="#" class="btn-primary" id="signup-btn">Sign Up Free</a>
            </div>
        </nav>
    </header>

    <main>

    <div id="signup-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Create Your Account</h2>
            <p>Join FoodSense AI to start your health journey</p>
            <form id="signup-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" placeholder="Enter your age" min="1" max="120" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>
                <div class="form-group">
                    <label for="language">Preferred Language</label>
                    <select id="language" name="language" required>
                        <option value="en">English</option>
                        <option value="hi">Hindi (हिंदी)</option>
                        <option value="bn">Bengali (বাংলা)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="health-conditions">Health Conditions (Optional)</label>
                    <select id="health-conditions" name="health-conditions">
                        <option value="">None</option>
                        <option value="diabetes">Diabetes</option>
                        <option value="hypertension">Hypertension</option>
                        <option value="heart-disease">Heart Disease</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <button type="submit" id="update-profile-btn" class="btn-primary" disabled>Update Profile</button>
            </form>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Modal functionality
        const signupModal = document.getElementById('signup-modal');
        const signupBtn = document.getElementById('signup-btn');
        const getStartedBtn = document.getElementById('get-started-btn');
        const closeModal = document.querySelector('.close-modal');
        const signupForm = document.getElementById('signup-form');
        const updateProfileBtn = document.getElementById('update-profile-btn');
        
        // Open signup modal
        [signupBtn, getStartedBtn].forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                signupModal.style.display = 'flex';
            });
        });
        
        // CTA button functionality
        const ctaSignupBtn = document.getElementById('cta-signup-btn');
        if (ctaSignupBtn) {
            ctaSignupBtn.addEventListener('click', function(e) {
                e.preventDefault();
                signupModal.style.display = 'flex';
            });
        }
        
        // Close modal
        closeModal.addEventListener('click', function() {
            signupModal.style.display = 'none';
        });
        
        // Close modal when clicking outside
        window.addEventListener('click', function(e) {
            if (e.target === signupModal) {
                signupModal.style.display = 'none';
            }
        });
        
        // Form validation
        const formInputs = signupForm.querySelectorAll('input');
        formInputs.forEach(input => {
            input.addEventListener('input', validateForm);
        });
        
        function validateForm() {
            let isValid = true;
            formInputs.forEach(input => {
                if (!input.value.trim()) {
                    isValid = false;
                }
            });
            updateProfileBtn.disabled = !isValid;
        }
        
        // Handle form submission
        signupForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = {
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                language: document.getElementById('language').value,
                healthConditions: document.getElementById('health-conditions').value
            };
            
            try {
                const resp = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.error || 'Failed to save user');
                }
                const saved = await resp.json();
                localStorage.setItem('userData', JSON.stringify({ 
                    name: saved.name, 
                    language: formData.language,
                    healthConditions: formData.healthConditions
                }));
                signupModal.style.display = 'none';
                
                // Show success message based on language
                const messages = {
                    en: 'Welcome to FoodSense AI! You can now scan products and get personalized nutrition guidance.',
                    hi: 'FoodSense AI में आपका स्वागत है! अब आप उत्पादों को स्कैन कर सकते हैं और व्यक्तिगत पोषण मार्गदर्शन प्राप्त कर सकते हैं।',
                    bn: 'FoodSense AI-এ স্বাগতম! এখন আপনি পণ্য স্ক্যান করতে পারেন এবং ব্যক্তিগত পুষ্টি নির্দেশনা পেতে পারেন।'
                };
                alert(messages[formData.language] || messages.en);
            } catch (err) {
                alert(err.message || 'Something went wrong.');
            }
        });
        
        // Theme toggle with improved functionality
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        
        // Check for saved theme preference or default to light mode
        const currentTheme = localStorage.getItem('theme') || 'light';
        
        // Apply the theme immediately
        if (currentTheme === 'dark') {
            htmlElement.setAttribute('data-theme', 'dark');
            const icon = themeToggle.querySelector('i');
            if (icon) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }
        }
        
        themeToggle.addEventListener('click', function() {
            const icon = this.querySelector('i');
            const currentDataTheme = htmlElement.getAttribute('data-theme');
            
            if (currentDataTheme === 'dark') {
                // Switch to light mode
                htmlElement.removeAttribute('data-theme');
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
                localStorage.setItem('theme', 'light');
            } else {
                // Switch to dark mode
                htmlElement.setAttribute('data-theme', 'dark');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
                localStorage.setItem('theme', 'dark');
            }
        });
        
        // Navigation smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href');
                const targetElement = document.querySelector(targetId);
                if (targetElement) {
                    targetElement.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    });
    </script>
